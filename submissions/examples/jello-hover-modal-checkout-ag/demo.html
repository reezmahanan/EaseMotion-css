<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jello-Hover Checkout Modal — E-Commerce Showcase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Checkout Container -->
    <main class="checkout-wrapper">
      <!-- Theme Switcher Button -->
      <button
        class="theme-switch-btn"
        id="themeToggleBtn"
        aria-label="Toggle light/dark theme"
        title="Toggle theme"
      >
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            id="theme-icon-path"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 5a7 7 0 100 14 7 7 0 000-14z"
          ></path>
        </svg>
      </button>

      <div class="checkout-header">
        <h1>Payment Checkout</h1>
        <p>Review your order items before completing the transaction.</p>
      </div>

      <div class="checkout-body">
        <!-- Order item 1 -->
        <div class="order-summary-item">
          <span class="item-title">EaseMotion Premium License</span>
          <span class="item-price">$149.00</span>
        </div>

        <!-- Order item 2 -->
        <div class="order-summary-item">
          <span class="item-title">UI Interaction Presets Pack</span>
          <span class="item-price">$49.00</span>
        </div>

        <!-- Order item 3 (Discount) -->
        <div class="order-summary-item" style="color: var(--checkout-accent)">
          <span class="item-title">Promo Discount (Code: EASE20)</span>
          <span class="item-price">-$20.00</span>
        </div>

        <div class="order-divider"></div>

        <!-- Total Row -->
        <div class="total-due-row">
          <span>Total Due</span>
          <span style="color: var(--checkout-primary)">$178.00</span>
        </div>

        <!-- Proceed trigger CTA button -->
        <button type="button" class="btn-primary-action" id="openModalBtn">
          Proceed to Payment
        </button>
      </div>
    </main>

    <!-- Interactive Live Variables Tuner Card -->
    <section class="variables-tweaker-card">
      <div class="tweaker-title-row">
        <h3>Customize Animation Parameters</h3>
      </div>
      <div class="tweaker-grid">
        <div class="tweak-control">
          <label for="jello-duration"
            >Jello Duration (<span id="val-duration">0.8</span>s)</label
          >
          <input
            type="range"
            id="jello-duration"
            min="0.3"
            max="1.5"
            step="0.05"
            value="0.8"
          />
        </div>
        <div class="tweak-control">
          <label for="jello-scale"
            >Scale Stretch Factor (<span id="val-scale">1.15</span>)</label
          >
          <input
            type="range"
            id="jello-scale"
            min="1.02"
            max="1.30"
            step="0.01"
            value="1.15"
          />
        </div>
        <div class="tweak-control">
          <label for="jello-skew"
            >Skew Strength (<span id="val-skew">-5</span>deg)</label
          >
          <input
            type="range"
            id="jello-skew"
            min="-12"
            max="-1"
            step="0.5"
