<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18296 - Parallax Tilt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18296 - Parallax Tilt</div>
    <div class="tilt-card" id="tiltCard">
      <div class="tilt-card-content">
        <h2>Hover Me</h2>
        <p>Move your mouse over this card</p>
      </div>
    </div>
  </div>
  <script>
    const card = document.getElementById('tiltCard');
    const maxAngle = 15;
    const perspective = 1000;

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateY = ((x - centerX) / centerX) * maxAngle;
      const rotateX = ((centerY - y) / centerY) * maxAngle;
      card.style.transform = `perspective(${perspective}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = `perspective(${perspective}px) rotateX(0deg) rotateY(0deg)`;
    });
  </script>
</body>
</html>
